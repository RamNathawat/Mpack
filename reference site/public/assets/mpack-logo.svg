<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <style>
      .m-light { fill: #1ea2dc; }
      .m-dark { fill: #24499d; }
      .text-mpack { 
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 900; 
        font-size: 38px; 
        fill: #24499d; 
        letter-spacing: 0.05em;
      }
      .text-sub { 
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 700; 
        font-size: 13px; 
        fill: #24499d; 
        letter-spacing: 0.35em;
      }
    </style>
  </defs>

  <!-- Left Light Blue Ribbon -->
  <polygon class="m-light" points="50,20 50,95 75,79.375 100,95 100,51.25" />
  
  <!-- Right Dark Blue Ribbon -->
  <polygon class="m-dark" points="150,20 150,95 125,79.375 100,95 100,51.25" />

  <!-- Text -->
  <text x="100" y="145" text-anchor="middle" class="text-mpack">MPACK</text>
  <text x="102" y="168" text-anchor="middle" class="text-sub">PACKAGING</text>
  <text x="102" y="188" text-anchor="middle" class="text-sub">SOLUTIONS</text>
</svg>
